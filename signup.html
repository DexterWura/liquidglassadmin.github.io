<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Liquid Glass Admin Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="logo auth-logo">Liquid Glass</h1>
                <p class="auth-subtitle">Create your account to get started.</p>
            </div>

            <form class="auth-form">
                <div class="form-group">
                    <label for="fullName">
                        <i class="fa-solid fa-user"></i> Full Name
                    </label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">
                        <i class="fa-solid fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fa-solid fa-lock"></i> Password
                    </label>
                    <div class="input-with-toggle">
                        <input type="password" id="password" name="password" placeholder="Create a password" required>
                        <button type="button" class="password-toggle" data-toggle-password="password">
                            <i class="fa-solid fa-eye" id="passwordToggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fa-solid fa-lock"></i> Confirm Password
                    </label>
                    <div class="input-with-toggle">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                        <button type="button" class="password-toggle" data-toggle-password="confirmPassword">
                            <i class="fa-solid fa-eye" id="confirmPasswordToggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-section-spacer">
                    <label class="auth-checkbox-label auth-checkbox-label-top">
                        <input type="checkbox" class="auth-checkbox auth-checkbox-offset" required>
                        <span>I agree to the <a href="#" class="auth-link">Terms of Service</a> and <a href="#" class="auth-link">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="auth-submit-btn">
                    <span>Create Account</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

                <div class="auth-divider">
                    <p class="auth-divider-text">Already have an account?</p>
                    <a href="login.html" class="auth-link">Sign in instead</a>
                </div>
            </form>

            <div class="auth-security-note">
                <p>
                    <i class="fa-solid fa-shield-halved"></i> Your data is secure and encrypted
                </p>
            </div>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
